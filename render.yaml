# =============================================================================
# NutriPulse — Render Blueprint (render.yaml)
# =============================================================================
# Deploy with: https://render.com/deploy → connect GitHub repo
# This creates both the web service AND PostgreSQL database automatically.
# =============================================================================

databases:
  - name: nutripulse-db
    plan: free
    databaseName: nutripulse
    user: nutripulse_user

services:
  - type: web
    name: nutripulse-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutripulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: USDA_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
